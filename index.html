<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notre album</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500;0,9..144,600;1,9..144,400;1,9..144,500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
  :root{
    --fond:      #14110f;
    --fond-2:    #1c1815;
    --ivoire:    #ede6da;
    --estompe:   #a49a8c;
    --laiton:    #c9a24b;
    --cadre:     rgba(237,230,218,.10);
  }
  *{ box-sizing:border-box; margin:0; padding:0; }
  html{ scroll-behavior:smooth; }
  body{
    background:var(--fond); color:var(--ivoire);
    font-family:"Inter", system-ui, sans-serif;
    -webkit-font-smoothing:antialiased; overflow-x:hidden;
  }
  body::before{
    content:""; position:fixed; inset:0; pointer-events:none; z-index:1;
    background:radial-gradient(120% 90% at 50% 35%, transparent 55%, rgba(0,0,0,.45) 100%);
  }
  .progression{
    position:fixed; top:0; left:0; height:3px; width:0%;
    background:linear-gradient(90deg, var(--laiton), #e9c877);
    z-index:50; transition:width .1s linear;
  }
  .couverture{
    min-height:100svh; display:flex; flex-direction:column;
    align-items:center; justify-content:center; text-align:center;
    padding:6vh 6vw; position:relative; z-index:2;
  }
  .couverture .eyebrow{
    font-size:.78rem; letter-spacing:.42em; text-transform:uppercase;
    color:var(--laiton); margin-bottom:1.6rem; font-weight:500; padding-left:.42em;
  }
  .couverture h1{
    font-family:"Fraunces", serif; font-weight:300;
    font-size:clamp(2.8rem, 9vw, 6.5rem);
    line-height:1.02; letter-spacing:-.01em; max-width:16ch;
  }
  .couverture .sous-titre{
    font-family:"Fraunces", serif; font-style:italic; font-weight:400;
    color:var(--estompe); font-size:clamp(1.05rem, 2.6vw, 1.5rem);
    margin-top:1.8rem; max-width:34ch; line-height:1.5;
  }
  .filet{ width:1px; height:64px; background:linear-gradient(var(--laiton), transparent); margin-top:3rem; }
  .indice{
    margin-top:1rem; font-size:.72rem; letter-spacing:.32em;
    text-transform:uppercase; color:var(--estompe);
    animation:respire 2.6s ease-in-out infinite;
  }
  @keyframes respire{ 0%,100%{opacity:.4} 50%{opacity:1} }

  .chapitre{
    min-height:100svh; display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    padding:9vh 5vw; position:relative; z-index:2; gap:1.6rem;
  }
  .cadre{
    position:relative; opacity:0; transform:translateY(38px);
    transition:opacity 1s cubic-bezier(.2,.7,.2,1), transform 1s cubic-bezier(.2,.7,.2,1);
  }
  .chapitre.vu .cadre{ opacity:1; transform:none; }
  .cadre img{
    display:block; max-width:min(1080px, 92vw); max-height:78svh;
    width:auto; height:auto; border-radius:2px;
    box-shadow:0 30px 80px -20px rgba(0,0,0,.75), 0 0 0 1px var(--cadre);
  }
  .num{
    position:absolute; top:-2.4rem; left:-.4rem;
    font-family:"Fraunces", serif; font-weight:300;
    font-size:clamp(3rem, 8vw, 5.5rem);
    color:var(--laiton); opacity:.22; line-height:1; user-select:none;
  }
  .legende{
    max-width:min(1080px, 92vw); text-align:center;
    opacity:0; transform:translateY(20px);
    transition:opacity 1s ease .18s, transform 1s ease .18s;
  }
  .chapitre.vu .legende{ opacity:1; transform:none; }
  .legende .compteur{
    font-size:.72rem; letter-spacing:.3em; text-transform:uppercase;
    color:var(--laiton); font-weight:500;
  }
  .legende .texte{
    font-family:"Fraunces", serif; font-style:italic; font-weight:400;
    color:var(--ivoire); font-size:clamp(1.05rem, 2.4vw, 1.45rem);
    margin-top:.5rem; line-height:1.5;
  }
  .fin{
    min-height:60svh; display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:1.2rem;
    padding:8vh 6vw; position:relative; z-index:2; text-align:center;
  }
  .fin .mot{
    font-family:"Fraunces", serif; font-style:italic; font-weight:300;
    font-size:clamp(1.4rem, 4vw, 2.2rem); color:var(--estompe);
  }
  .fin button{
    margin-top:.6rem; background:transparent; color:var(--ivoire);
    border:1px solid var(--cadre); border-radius:100px;
    padding:.7rem 1.5rem; font-family:inherit; font-size:.8rem;
    letter-spacing:.14em; text-transform:uppercase; cursor:pointer;
    transition:border-color .3s, color .3s;
  }
  .fin button:hover, .fin button:focus-visible{ border-color:var(--laiton); color:var(--laiton); }
  .info{
    min-height:100svh; display:flex; align-items:center; justify-content:center;
    text-align:center; padding:8vw; position:relative; z-index:2;
  }
  .info p{ color:var(--estompe); font-family:"Fraunces",serif; font-style:italic;
           font-size:1.2rem; line-height:1.7; max-width:40ch; }
  .info code{ font-family:ui-monospace,monospace; font-style:normal;
              color:var(--laiton); background:var(--fond-2); padding:.15em .45em; border-radius:4px; }
  :focus-visible{ outline:2px solid var(--laiton); outline-offset:4px; }
  @media (prefers-reduced-motion:reduce){
    html{ scroll-behavior:auto; }
    .cadre,.legende{ transition:none; opacity:1; transform:none; }
    .indice{ animation:none; }
  }
</style>
</head>
<body>

<div class="progression" id="progression"></div>
<main id="album"></main>

<script>
/* ════════════════════════════════════════════════════════════════════════
   ▛ RÉGLAGES — c'est ici, et seulement ici, que vous modifiez le texte ▟
   ════════════════════════════════════════════════════════════════════════ */

const CONFIG = {
  titre:     "51 ans et bientot un  travail",
  sousTitre: "Ici vous allez decouvrir les coulisse de la galerie de vie avec Monsieur le presidents ou pour les intimes oliver FRARD (merci henri)",
  motFin:    "Fin.",
  dossier:   "photos",
  extension: "jpg",
};

/* ── Légendes (facultatif) ────────────────────────────────────────────────
   La clé = le NUMÉRO de la photo. Laissez "" si vous ne voulez pas de texte.
   Exemple :  3: "Le premier jour au jardin",                                */
const LEGENDES = {
  1:  "comme vous l'aurait deviner oliver frard c'est tout d'abord le PDG du 38 mais pas que.... ",
  2:  "car oui olivier frard c'est aussi le plombier ",
  3:  "et le jardinier ",
  4:  "et le maçon ",
  5:  "et le menuisier et j'en passe   ",
  6:  " mais apres tous cela c'est aussi un homme fort droit quelqu'un quia des idées qui  sait parler et diriger   ",
  7:  "vous l'aures compris plein d'idée merci chat GPT                      passons au quelque portrait que nous avons pu trouver de lui",
  8:  "il a  su fair evoluer sa coupe au gres des saisons   ",
  9:  "mais malhreusement seulement parfois",
  10: "Olivier frard alias bichkon delabichettes gamae frarternelle cocoeaulive est superbe skiper ",
  11: "il vous emenera jusq'ou bout quitte a negliger son style  ",
  12: "la ou vous imaginiez meme pas ne etre capable ",
  13: "Et surtout dans ses visites d'appartement ",
  14: "Texte à compléter",
  15: "Texte à compléter",
  16: "Texte à compléter",
  17: "Texte à compléter",
  18: "un super photographes en temoignera la multitude de selfie ou",
  19: "Texte à compléter",
  20: "Texte à compléter",
  21: "Texte à compléter",
  22: "Texte à compléter",
  23: "Texte à compléter",
  24: "Texte à compléter",
  25: "Texte à compléter",
  26: "Texte à compléter",
  27: "Texte à compléter",
  28: "Texte à compléter",
  29: "Texte à compléter",
  30: "Texte à compléter",
  31: "Texte à compléter",
};

/* ════════════════════════════════════════════════════════════════════════
   ▛ Vous pouvez arrêter votre lecture ici — le reste fonctionne tout seul ▟

   COMMENT ÇA MARCHE
   • Le site cherche les photos dans le dossier "photos" :
     1.jpg, 2.jpg, 3.jpg… et les affiche dans l'ordre des numéros.
   • Pour CHANGER L'ORDRE : renommez simplement le numéro d'un fichier.
     Ex. pour mettre la photo 7 en couverture, appelez-la 1.jpg
         (et renommez l'ancienne 1.jpg en 7.jpg pour l'échanger).
   • Pour AJOUTER une photo : mettez-la dans le dossier avec le numéro suivant.
   • Numérotez sans « trou » : 1, 2, 3, 4… (un petit trou est toléré).
════════════════════════════════════════════════════════════════════════ */

const TROUS_TOLERES = 4;
const BORNE_MAX      = 400;

function chargeImage(src){
  return new Promise(resolve=>{
    const img = new Image();
    img.onload  = ()=>resolve(img);
    img.onerror = ()=>resolve(null);
    img.src = src;
  });
}
async function trouverPhotos(){
  const trouvees = []; let manquants = 0;
  for(let n=1; n<=BORNE_MAX; n++){
    const src = `${CONFIG.dossier}/${n}.${CONFIG.extension}`;
    const img = await chargeImage(src);
    if(img){ trouvees.push({n, src, w:img.naturalWidth, h:img.naturalHeight}); manquants=0; }
    else{ manquants++; if(manquants>TROUS_TOLERES && trouvees.length) break; if(n>20 && !trouvees.length) break; }
  }
  return trouvees;
}
function construire(photos){
  const album = document.getElementById('album');
  const cov = document.createElement('header');
  cov.className = 'couverture';
  cov.innerHTML = `
    <div class="eyebrow">Album</div>
    <h1>${escapeHtml(CONFIG.titre)}</h1>
    ${CONFIG.sousTitre ? `<p class="sous-titre">${escapeHtml(CONFIG.sousTitre)}</p>` : ''}
    <div class="filet"></div>
    <div class="indice">Défilez pour commencer</div>`;
  album.appendChild(cov);

  const total = photos.length;
  photos.forEach((p, i)=>{
    const sec = document.createElement('section');
    sec.className = 'chapitre';
    const legende = (LEGENDES[p.n] || '').trim();
    sec.innerHTML = `
      <div class="cadre">
        <span class="num">${String(p.n).padStart(2,'0')}</span>
        <img src="${p.src}" alt="Photo ${p.n}" loading="lazy" width="${p.w}" height="${p.h}">
      </div>
      <div class="legende">
        <div class="compteur">${String(i+1).padStart(2,'0')} — ${String(total).padStart(2,'0')}</div>
        ${legende ? `<div class="texte">${escapeHtml(legende)}</div>` : ''}
      </div>`;
    album.appendChild(sec);
  });

  const fin = document.createElement('footer');
  fin.className = 'fin';
  fin.innerHTML = `
    <div class="mot">${escapeHtml(CONFIG.motFin)}</div>
    <button onclick="window.scrollTo({top:0,behavior:'smooth'})">Revenir au début</button>`;
  album.appendChild(fin);
  revelerAuScroll();
}
function revelerAuScroll(){
  const obs = new IntersectionObserver((entries)=>{
    entries.forEach(e=>{ if(e.isIntersecting){ e.target.classList.add('vu'); obs.unobserve(e.target); } });
  }, { threshold:.18 });
  document.querySelectorAll('.chapitre').forEach(el=>obs.observe(el));
}
function majProgression(){
  const h = document.documentElement;
  const p = h.scrollTop / (h.scrollHeight - h.clientHeight || 1);
  document.getElementById('progression').style.width = (p*100)+'%';
}
window.addEventListener('scroll', majProgression, {passive:true});
function escapeHtml(s){ return String(s).replace(/[&<>"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function messageVide(){
  document.getElementById('album').innerHTML = `
    <div class="info"><p>Aucune photo trouvée.<br><br>
      Placez vos images dans un dossier <code>photos</code>,
      nommées <code>1.jpg</code>, <code>2.jpg</code>, <code>3.jpg</code>…
    </p></div>`;
}
(async function(){
  const photos = await trouverPhotos();
  if(!photos.length){ messageVide(); return; }
  construire(photos);
  majProgression();
})();
</script>
</body>
</html>
